<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SLAM! Athletics FAQ</title>
  <style>
    body { margin:0; background:#050505; color:#f5f5f5; font-family:Arial,Helvetica,sans-serif; cursor:url("assets/football-cursor.svg") 3 3, auto; }
    a, button, summary { cursor:url("assets/football-cursor.svg") 3 3, pointer; }
    .page { max-width:920px; margin:0 auto; padding:28px 16px 56px; }
    a { color:#80FF00; }
    .topbar { display:flex; justify-content:flex-end; margin-bottom:22px; }
    .back { display:inline-flex; align-items:center; justify-content:center; min-height:38px; padding:0 14px; border:1px solid rgba(255,255,255,.14); border-radius:999px; background:rgba(255,255,255,.06); color:#fff; font:800 11px monospace; letter-spacing:.08em; text-decoration:none; text-transform:uppercase; white-space:nowrap; }
    .back:hover { border-color:rgba(128,255,0,.38); color:#80FF00; }
    h1 { margin:28px 0 8px; font:64px/.9 Impact,"Arial Black",sans-serif; text-transform:uppercase; }
    h1 span { color:#80FF00; }
    .intro { margin:0 0 24px; color:#aaa; line-height:1.45; }
    .faq { display:grid; gap:12px; }
    .faq-group { display:grid; gap:12px; padding-top:6px; }
    .faq-group + .faq-group { margin-top:28px; }
    .faq-group-title { margin:0 0 2px; color:#fff; font:30px/.95 Impact,"Arial Black",sans-serif; text-transform:uppercase; letter-spacing:.02em; }
    .faq-group-title:before { content:""; display:inline-block; width:8px; height:8px; margin-right:10px; border-radius:999px; background:#80FF00; box-shadow:0 0 12px rgba(128,255,0,.45); vertical-align:middle; }
    details { background:linear-gradient(180deg,rgba(28,28,28,.94),rgba(14,14,14,.94)); border:1px solid rgba(255,255,255,.12); border-radius:16px; overflow:hidden; }
    summary { cursor:pointer; padding:18px 20px; font-weight:800; list-style:none; }
    summary::-webkit-details-marker { display:none; }
    details[open] summary { color:#80FF00; border-bottom:1px solid rgba(128,255,0,.16); }
    .answer { padding:0 20px 18px; color:#c9c9c9; line-height:1.55; }
    .faq-link { display:inline-flex; margin-top:10px; color:#80FF00; font:800 11px monospace; letter-spacing:.08em; text-transform:uppercase; text-decoration:none; }
    .empty { color:#999; padding:20px; border:1px dashed rgba(255,255,255,.18); border-radius:16px; }
    .loading { display:inline-flex; align-items:center; gap:10px; color:#999; padding:20px; border:1px dashed rgba(255,255,255,.18); border-radius:16px; font:800 11px monospace; letter-spacing:.1em; text-transform:uppercase; }
    .spinner { width:22px; height:22px; background:url("assets/bull-only-transparent.png") center/contain no-repeat; border-radius:999px; filter:drop-shadow(0 0 8px rgba(128,255,0,.45)); animation:spin .9s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @media (max-width:520px){ .page{padding:18px 12px 42px}.topbar{justify-content:stretch}.back{width:100%}h1{font-size:46px}.faq-group-title{font-size:24px}summary{padding:16px}.answer{padding:0 16px 16px} }
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <a class="back" href="slam.html">← Back to homepage</a>
    </div>
    <h1><span>Frequently</span> Asked Questions</h1>
    <p class="intro">Answers are grouped automatically from the FAQ sheet using keywords, questions, and answer text.</p>
    <div id="faq" class="faq"><div class="loading"><span class="spinner"></span>Loading answers...</div></div>
  </main>
  <script>
    var endpoint = 'https://script.google.com/macros/s/AKfycbxKWDLcTjDwwXb-rNq9LTpqQwmlGgvLHZf9kJKDG7DHqwNp6vjaXD8S4ccG_41CBMfk/exec';
    var groups = [
      { label:'Registration', terms:['register','rma','athlete','form','paperwork'] },
      { label:'Tryouts', terms:['tryout','roster','team','selection'] },
      { label:'Physicals', terms:['physical','medical','doctor','cvs'] },
      { label:'Eligibility', terms:['eligible','absent','attendance','suspension','rpc','grades'] },
      { label:'Fees', terms:['fee','cost','pay','payment','money'] },
      { label:'Sports & Seasons', terms:['soccer','basketball','football','cheer','volleyball','track','season','games','practice'] },
      { label:'General', terms:[] }
    ];
    function esc(s){ return String(s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
    function linkify(s){
      return esc(s).replace(/(https?:\/\/[^\s<]+)/g,function(url){
        return '<a href="'+url+'" target="_blank" rel="noopener noreferrer">'+url.replace(/^https?:\/\//,'').replace(/\/$/,'')+'</a>';
      });
    }
    function groupFor(item){
      var text = [item.keywords, item.q, item.question, item.a, item.answer].join(' ').toLowerCase();
      for (var i = 0; i < groups.length - 1; i++) {
        if (groups[i].terms.some(function(term){ return text.indexOf(term) !== -1; })) return groups[i].label;
      }
      return 'General';
    }
    function renderItem(item){
      var q = item.q || item.question || '';
      var a = item.a || item.answer || '';
      return '<details><summary>'+esc(q)+'</summary><div class="answer">'+linkify(a)+(item.link ? '<br><a class="faq-link" href="'+esc(item.link)+'" target="_blank" rel="noopener noreferrer">Open link</a>' : '')+'</div></details>';
    }
    function render(faq){
      if (!faq.length) {
        document.getElementById('faq').innerHTML = '<div class="empty">No FAQ rows yet.</div>';
        return;
      }
      var buckets = {};
      groups.forEach(function(group){ buckets[group.label] = []; });
      faq.forEach(function(item){ buckets[groupFor(item)].push(item); });
      document.getElementById('faq').innerHTML = groups.map(function(group){
        var items = buckets[group.label];
        if (!items.length) return '';
        return '<section class="faq-group"><h2 class="faq-group-title">'+esc(group.label)+'</h2>'+items.map(renderItem).join('')+'</section>';
      }).join('');
    }
    try {
      var cached = JSON.parse(localStorage.getItem('slam_content_cache') || 'null');
      if (cached && Array.isArray(cached.faq)) render(cached.faq);
    } catch(e) {}
    fetch(endpoint + '?action=all&t=' + Date.now())
      .then(function(r){ return r.json(); })
      .then(function(data){
        var faq = Array.isArray(data.faq) ? data.faq : [];
        render(faq);
      })
      .catch(function(){ document.getElementById('faq').innerHTML = '<div class="empty">Could not load FAQ right now.</div>'; });
  </script>
</body>
</html>
