<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SLAM! Athletics FAQ</title>
  <style>
    body { margin:0; background:#050505; color:#f5f5f5; font-family:Arial,Helvetica,sans-serif; }
    .page { max-width:920px; margin:0 auto; padding:28px 16px 56px; }
    a { color:#80FF00; }
    .side-nav { position:absolute; top:0; right:0; z-index:30; width:232px; padding:16px 16px 18px; display:flex; flex-direction:column; gap:0; background:linear-gradient(180deg,rgba(218,0,22,.94),rgba(150,0,16,.94)); border:1px solid rgba(255,255,255,.12); border-radius:0 31px 0 18px; box-shadow:0 24px 70px rgba(0,0,0,.38); }
    .side-nav a { min-height:44px; display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 0; background:transparent; border-bottom:1.5px dashed rgba(255,255,255,.42); color:rgba(255,255,255,.94); font:800 19px/.98 Impact,"Arial Black",sans-serif; text-decoration:none; text-transform:uppercase; overflow-wrap:anywhere; }
    .side-nav a:hover { color:#80FF00; transform:translateX(4px); }
    .side-nav-logo { min-height:0!important; justify-content:flex-start!important; border-bottom:none!important; padding:0 0 12px!important; }
    .side-nav-logo img { width:88px; max-width:100%; height:auto; display:block; filter:drop-shadow(0 8px 18px rgba(0,0,0,.22)); }
    .side-nav i { width:25px; height:25px; border-radius:999px; background:rgba(10,10,10,.72); flex:0 0 auto; position:relative; }
    .side-nav i:before { content:">"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#fff; font:900 14px monospace; }
    .back { color:#80FF00; font:700 12px monospace; letter-spacing:.1em; text-decoration:none; text-transform:uppercase; }
    h1 { margin:28px 0 8px; font:64px/.9 Impact,"Arial Black",sans-serif; text-transform:uppercase; }
    h1 span { color:#80FF00; }
    .faq { display:grid; gap:12px; }
    details { background:linear-gradient(180deg,rgba(28,28,28,.94),rgba(14,14,14,.94)); border:1px solid rgba(255,255,255,.12); border-radius:16px; overflow:hidden; }
    summary { cursor:pointer; padding:18px 20px; font-weight:800; list-style:none; }
    summary::-webkit-details-marker { display:none; }
    details[open] summary { color:#80FF00; border-bottom:1px solid rgba(128,255,0,.16); }
    .answer { padding:0 20px 18px; color:#c9c9c9; line-height:1.55; }
    .faq-link { display:inline-flex; margin-top:10px; color:#80FF00; font:800 11px monospace; letter-spacing:.08em; text-transform:uppercase; text-decoration:none; }
    .empty { color:#999; padding:20px; border:1px dashed rgba(255,255,255,.18); border-radius:16px; }
    .loading { display:inline-flex; align-items:center; gap:10px; color:#999; padding:20px; border:1px dashed rgba(255,255,255,.18); border-radius:16px; font:800 11px monospace; letter-spacing:.1em; text-transform:uppercase; }
    .spinner { width:16px; height:16px; border:2px solid rgba(255,255,255,.16); border-top-color:#80FF00; border-radius:999px; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @media (max-width:1100px){ .side-nav{position:static; width:auto; margin:12px 16px 0; padding:10px; border-radius:18px; display:grid; grid-template-columns:82px 1fr; align-items:start; gap:8px 12px;} .side-nav-logo{grid-row:span 4; padding:0!important;} .side-nav-logo img{width:70px;} .side-nav a:not(.side-nav-logo){min-height:32px; padding:7px 0; font-size:15px; border-bottom-width:1.5px;} .side-nav i{width:22px;height:22px;} .side-nav i:before{font-size:12px;} }
    @media (max-width:520px){ .side-nav{margin:10px 10px 0; grid-template-columns:1fr;} .side-nav-logo{justify-content:center!important;} .side-nav-logo img{width:78px;margin:0 auto;} .side-nav a:not(.side-nav-logo){font-size:16px;min-height:34px;} }
  </style>
</head>
<body>
  <nav class="side-nav" aria-label="Athletics navigation">
    <a class="side-nav-logo" href="slam.html" aria-label="SLAM! Athletics home"><img src="assets/bull-only-transparent.png" alt="SLAM! Athletics bull"></a>
    <a href="slam.html#register"><span>Register for sports</span><i></i></a>
    <a href="slam.html#eligibility"><span>Athletic eligibility</span><i></i></a>
    <a href="slam.html#physicals"><span>Sports physicals/insurance</span><i></i></a>
    <a href="slam.html#commitment"><span>Bulls commitment</span><i></i></a>
    <a href="slam.html#sports"><span>Sports offered</span><i></i></a>
    <a href="slam-tryouts.html"><span>Tryouts</span><i></i></a>
    <a href="slam.html#coach"><span>Coach for SLAM!</span><i></i></a>
  </nav>
  <main class="page">
    <a class="back" href="slam.html">← Back to SLAM!</a>
    <h1><span>Q</span> and A</h1>
    <div id="faq" class="faq"><div class="loading"><span class="spinner"></span>Loading answers...</div></div>
  </main>
  <script>
    var endpoint = 'https://script.google.com/macros/s/AKfycbxKWDLcTjDwwXb-rNq9LTpqQwmlGgvLHZf9kJKDG7DHqwNp6vjaXD8S4ccG_41CBMfk/exec';
    function esc(s){ return String(s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
    function linkify(s){
      return esc(s).replace(/(https?:\/\/[^\s<]+)/g,function(url){
        return '<a href="'+url+'" target="_blank" rel="noopener noreferrer">'+url.replace(/^https?:\/\//,'').replace(/\/$/,'')+'</a>';
      });
    }
    function render(faq){
      document.getElementById('faq').innerHTML = faq.length ? faq.map(function(item){
        return '<details><summary>'+esc(item.q)+'</summary><div class="answer">'+linkify(item.a)+(item.link ? '<br><a class="faq-link" href="'+esc(item.link)+'" target="_blank" rel="noopener noreferrer">Open link</a>' : '')+'</div></details>';
      }).join('') : '<div class="empty">No FAQ rows yet.</div>';
    }
    try {
      var cached = JSON.parse(localStorage.getItem('slam_content_cache') || 'null');
      if (cached && Array.isArray(cached.faq)) render(cached.faq);
    } catch(e) {}
    fetch(endpoint + '?action=all&t=' + Date.now())
      .then(function(r){ return r.json(); })
      .then(function(data){
        var faq = Array.isArray(data.faq) ? data.faq : [];
        render(faq);
      })
      .catch(function(){ document.getElementById('faq').innerHTML = '<div class="empty">Could not load FAQ right now.</div>'; });
  </script>
</body>
</html>
