    /* ---- Design system ---- */
/* ============================================================
   SLAM! Elementary Athletics — Design Tokens
   Dark-first. Black is the canvas; red and lime are the noise.
   ============================================================ */

@import url("https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap");

/* ---------- BRAND DISPLAY FAMILY ----------
   "NCAA Illinois Fighting Illini" — a collegiate athletic block face.
   Regular = the workhorse display weight.
   Bold = louder accents (statlines, score, championships).
   Outline = stencil/halftone overlays and large-scale brand moments. */
@font-face {
  font-family: "Illini";
  src: url("fonts/ncaa_illinois_fighting_illini.otf") format("opentype");
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: "Illini";
  src: url("fonts/ncaa_illinois_fighting_illinibold.otf") format("opentype");
  font-weight: 700;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: "Illini Outline";
  src: url("fonts/ncaa_illinois_fighting_illini_outline.otf") format("opentype");
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}

:root {
  /* ---------- BRAND COLORS (raw) — aligned to PMS spec ---------- */
  --slam-black:        #000000;   /* PMS Black */
  --slam-ink:          #141414;   /* surface 1 */
  --slam-coal:         #1F1F1F;   /* surface 2 */
  --slam-graphite:     #2A2A2A;   /* border */
  --slam-smoke:        #3D3D3D;   /* border strong */
  --slam-fog:          #6B6B6B;   /* muted fg */
  --slam-cool-gray:    #7D9398;   /* PMS Cool Gray 8C — neutral */
  --slam-chalk:        #A1A1A1;   /* dim fg */
  --slam-bone:         #E8E8E6;   /* off-white */
  --slam-white:        #FFFFFF;   /* PMS White */

  --slam-red:          #DA0016;   /* PMS 186C — primary accent */
  --slam-red-deep:     #A8000F;   /* pressed/hover red */
  --slam-red-soft:     #2A0405;   /* red wash bg */

  --slam-lime:         #80FF00;   /* PMS 802C · Fluor. Green — secondary accent */
  --slam-lime-deep:    #66CC00;   /* pressed/hover lime */
  --slam-lime-soft:    #142A00;   /* lime wash bg */

  /* ---------- SEMANTIC — DARK (default) ---------- */
  --bg:                var(--slam-black);
  --bg-surface:        var(--slam-ink);
  --bg-raised:         var(--slam-coal);
  --bg-overlay:        rgba(10, 10, 10, 0.72);

  --border:            var(--slam-graphite);
  --border-strong:     var(--slam-smoke);
  --border-accent:     var(--slam-lime);

  --fg:                var(--slam-white);
  --fg-muted:          var(--slam-chalk);
  --fg-dim:            var(--slam-fog);
  --fg-inverse:        var(--slam-black);

  --accent:            var(--slam-red);
  --accent-hover:      var(--slam-red-deep);
  --accent-fg:         var(--slam-white);

  --accent-2:          var(--slam-lime);
  --accent-2-hover:    var(--slam-lime-deep);
  --accent-2-fg:       var(--slam-black);

  /* ---------- STATUS ---------- */
  --success:           var(--slam-lime);
  --success-fg:        var(--slam-black);
  --danger:            var(--slam-red);
  --danger-fg:         var(--slam-white);
  --warning:           #FFB23D;
  --info:              #5BC0FF;

  /* ---------- TYPE FAMILIES ---------- */
  --font-display:  "Illini", "Archivo Black", "Impact", sans-serif;      /* collegiate athletic block — the SLAM voice */
  --font-display-outline: "Illini Outline", "Illini", "Impact", sans-serif; /* stencil/outline accent */
  --font-sans:     "Space Grotesk", "Archivo", system-ui, sans-serif;     /* body + UI */
  --font-mono:     "Space Mono", ui-monospace, "SF Mono", monospace;      /* numbers, tags, scoreboard */

  /* ---------- TYPE SCALE ---------- */
  --fs-12: 0.75rem;
  --fs-14: 0.875rem;
  --fs-16: 1rem;
  --fs-18: 1.125rem;
  --fs-20: 1.25rem;
  --fs-24: 1.5rem;
  --fs-32: 2rem;
  --fs-40: 2.5rem;
  --fs-56: 3.5rem;
  --fs-72: 4.5rem;
  --fs-96: 6rem;
  --fs-128: 8rem;

  --lh-tight:   0.92;
  --lh-snug:    1.1;
  --lh-normal:  1.5;
  --lh-loose:   1.7;

  --tracking-tight:   -0.02em;
  --tracking-snug:    -0.01em;
  --tracking-normal:  0;
  --tracking-wide:    0.04em;
  --tracking-shout:   0.08em;   /* uppercase eyebrows */

  /* ---------- SPACING (4pt grid) ---------- */
  --space-1:  4px;
  --space-2:  8px;
  --space-3:  12px;
  --space-4:  16px;
  --space-5:  20px;
  --space-6:  24px;
  --space-8:  32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;
  --space-20: 80px;
  --space-24: 96px;
  --space-32: 128px;

  /* ---------- RADII (rounded, never cutesy) ---------- */
  --radius-xs: 4px;     /* tags, inline pills */
  --radius-sm: 8px;     /* inputs, small cards */
  --radius-md: 12px;    /* cards */
  --radius-lg: 20px;    /* feature cards */
  --radius-xl: 28px;    /* hero panels */
  --radius-pill: 999px; /* buttons, chips */

  /* ---------- SHADOWS (sparingly — dark UI prefers borders) ---------- */
  --shadow-sm:  0 1px 2px rgba(0,0,0,0.5);
  --shadow-md:  0 4px 12px rgba(0,0,0,0.45), 0 1px 2px rgba(0,0,0,0.6);
  --shadow-lg:  0 12px 32px rgba(0,0,0,0.55), 0 2px 6px rgba(0,0,0,0.6);
  --shadow-glow-red:  0 0 0 4px rgba(255,45,45,0.18);
  --shadow-glow-lime: 0 0 0 4px rgba(198,255,61,0.22);

  /* ---------- MOTION ---------- */
  --ease-out:    cubic-bezier(0.22, 1, 0.36, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --ease-snap:   cubic-bezier(0.5, 1.5, 0.6, 1);   /* small overshoot for "slam" feel */
  --dur-fast:    120ms;
  --dur-base:    200ms;
  --dur-slow:    420ms;
}

/* ---------- LIGHT MODE (inverted — the away jersey) ---------- */
[data-theme="light"] {
  --bg:            #FAFAF8;
  --bg-surface:    #FFFFFF;
  --bg-raised:     #F3F3F0;
  --bg-overlay:    rgba(250, 250, 248, 0.8);

  --border:        #E2E2DE;
  --border-strong: #BEBEB8;

  --fg:            var(--slam-black);
  --fg-muted:      #3D3D3D;
  --fg-dim:        #6B6B6B;
  --fg-inverse:    var(--slam-white);

  --accent-fg:     var(--slam-white);
  --accent-2-fg:   var(--slam-black);
}

/* ============================================================
   SEMANTIC ELEMENT STYLES
   ============================================================ */
html, body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-sans);
  font-size: var(--fs-16);
  line-height: var(--lh-normal);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* DISPLAY — huge condensed Anton, the SLAM voice */
.t-display, h1.display {
  font-family: var(--font-display);
  font-size: clamp(var(--fs-72), 12vw, var(--fs-128));
  line-height: var(--lh-tight);
  letter-spacing: var(--tracking-snug);
  text-transform: uppercase;
  font-weight: 400;   /* Anton is one weight; bold via size */
}

h1, .t-h1 {
  font-family: var(--font-display);
  font-size: var(--fs-72);
  line-height: var(--lh-tight);
  letter-spacing: var(--tracking-snug);
  text-transform: uppercase;
  font-weight: 400;
  margin: 0;
}

h2, .t-h2 {
  font-family: var(--font-display);
  font-size: var(--fs-56);
  line-height: var(--lh-tight);
  letter-spacing: var(--tracking-snug);
  text-transform: uppercase;
  font-weight: 400;
  margin: 0;
}

h3, .t-h3 {
  font-family: var(--font-sans);
  font-size: var(--fs-32);
  line-height: var(--lh-snug);
  letter-spacing: var(--tracking-tight);
  font-weight: 700;
  margin: 0;
}

h4, .t-h4 {
  font-family: var(--font-sans);
  font-size: var(--fs-24);
  line-height: var(--lh-snug);
  letter-spacing: var(--tracking-tight);
  font-weight: 600;
  margin: 0;
}

p, .t-body {
  font-family: var(--font-sans);
  font-size: var(--fs-16);
  line-height: var(--lh-normal);
  color: var(--fg);
  margin: 0;
}

.t-body-lg {
  font-size: var(--fs-20);
  line-height: var(--lh-normal);
}

.t-body-sm {
  font-size: var(--fs-14);
  line-height: var(--lh-normal);
  color: var(--fg-muted);
}

.t-eyebrow {
  font-family: var(--font-mono);
  font-size: var(--fs-12);
  letter-spacing: var(--tracking-shout);
  text-transform: uppercase;
  color: var(--fg-muted);
  font-weight: 700;
}

.t-mono, code, kbd {
  font-family: var(--font-mono);
  font-size: 0.95em;
}

.t-stat {
  font-family: var(--font-display);
  font-size: var(--fs-96);
  line-height: var(--lh-tight);
  letter-spacing: var(--tracking-snug);
  font-weight: 400;
}

a {
  color: inherit;
  text-decoration: none;
  border-bottom: 1px solid currentColor;
  transition: opacity var(--dur-fast) var(--ease-out);
}
a:hover { opacity: 0.7; }


    /* ---- App styles ---- */
@import url("colors_and_type.css");

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
body { overflow-x: hidden; }

/* ============== PAGE SHELL ============== */
.page {
  min-height: 100vh;
  background: var(--bg);
  position: relative;
}

/* ============== NAV ============== */
.nav {
  position: sticky;
  top: 20px;
  margin: 20px 32px 0;
  background: rgba(20, 20, 20, 0.72);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 10px 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 50;
}
.nav-logo-link {
  display: inline-flex;
  align-items: center;
  border: none;
  text-decoration: none;
  transition: transform var(--dur-fast) var(--ease-snap);
}
.nav-logo-link:hover { transform: scale(1.04); }
.nav-logo-link:active { transform: scale(0.97); }
.nav-logo-img {
  height: 48px;
  width: auto;
  display: block;
}

/* ============== HERO ============== */
.hero {
  position: relative;
  margin: 24px 32px 0;
  padding: 64px 56px 80px;
  border-radius: 32px;
  overflow: hidden;
  background: var(--slam-black);
  border: 1px solid var(--border);
  min-height: 78vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.hero-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}
.hero-bg svg, .hero-bg video, .hero-bg img {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
}
/* Subtle slow drift on the bg pattern — gives life without distraction */
.hero-bg.vignette > svg {
  animation: bg-drift 38s linear infinite;
  transform-origin: center;
}
@keyframes bg-drift {
  0%   { transform: translate3d(0, 0, 0) scale(1.08); }
  50%  { transform: translate3d(-2.5%, -1.5%, 0) scale(1.12); }
  100% { transform: translate3d(0, 0, 0) scale(1.08); }
}
.hero-bg.vignette::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.45) 60%, rgba(0,0,0,0.82) 100%);
  pointer-events: none;
}
.hero-bg.solid-red { background: var(--slam-red); }
.hero-bg.solid-lime { background: var(--slam-lime); }
.hero-bg.solid-black { background: var(--slam-black); }

.hero-inner {
  position: relative;
  z-index: 1;
  max-width: 980px;
}

/* CENTERED variant for the simple welcome layout */
.hero-center {
  margin: 0 auto;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.welcome-eyebrow {
  font-family: var(--font-sans);
  font-size: clamp(13px, 1.1vw, 16px);
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--fg-muted);
  margin-bottom: 28px;
  opacity: 0;
  animation: fade-up 0.7s var(--ease-out) 0.05s forwards;
}

/* Big centered logo — Google-homepage style */
.hero-logo {
  display: block;
  width: clamp(280px, 46vw, 560px);
  height: auto;
  margin: 0 auto;
  filter: drop-shadow(0 0 40px rgba(128, 255, 0, 0.18));
  opacity: 0;
  transform: scale(0.92);
  animation: logo-in 1.1s var(--ease-out) 0.2s forwards;
}
@keyframes logo-in {
  from { opacity: 0; transform: scale(0.92); }
  to   { opacity: 1; transform: scale(1); }
}

.hero-title {
  font-family: var(--font-display);
  font-size: clamp(64px, 9.4vw, 168px);
  line-height: 0.86;
  letter-spacing: -0.018em;
  margin: 0;
  text-transform: uppercase;
  color: var(--slam-white);
}
.hero-title-center {
  margin: 0 auto;
  text-align: center;
  max-width: 900px;
}
.hero-title .accent-red { color: var(--slam-red); }
.hero-title .accent-lime { color: var(--slam-lime); }
.hero-title .bang { color: var(--slam-lime); }

/* Word-by-word reveal */
.hero-title .word {
  display: inline-block;
  opacity: 0;
  transform: translateY(0.55em);
  filter: blur(8px);
  animation: word-in 0.85s var(--ease-out) forwards;
}
.hero-title .word:nth-child(odd) { color: var(--slam-white); }
/* Highlight "SLAM!" word in lime */
.hero-title .word:first-of-type {
  color: var(--slam-lime);
}
@keyframes word-in {
  0%   { opacity: 0; transform: translateY(0.55em); filter: blur(10px); }
  60%  { opacity: 1; filter: blur(0); }
  100% { opacity: 1; transform: translateY(0); filter: blur(0); }
}
@keyframes fade-up {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.signup-wrap-center {
  width: 100%;
  max-width: 580px;
  margin: 36px auto 18px;
  opacity: 0;
  animation: fade-up 0.8s var(--ease-out) 0.95s forwards;
}

.hero-desc {
  font-family: var(--font-sans);
  font-size: clamp(14px, 1.3vw, 17px);
  line-height: 1.55;
  color: var(--fg-muted);
  margin: 12px auto 0;
  max-width: 480px;
  opacity: 0;
  animation: fade-up 0.8s var(--ease-out) 1.15s forwards;
}

/* ============== SIGNUP FORM ============== */
.signup {
  margin-top: 0;
  max-width: 580px;
  width: 100%;
}
.signup-form {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(20, 20, 20, 0.78);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1.5px solid rgba(128, 255, 0, 0.4);
  border-radius: 999px;
  padding: 6px 6px 6px 22px;
  transition: border-color var(--dur-base) var(--ease-out),
              box-shadow var(--dur-base) var(--ease-out),
              transform var(--dur-base) var(--ease-snap);
  position: relative;
  animation: signup-breathe 3.2s ease-in-out infinite;
}
@keyframes signup-breathe {
  0%, 100% {
    box-shadow: 0 0 0 0 rgba(128, 255, 0, 0.12),
                0 8px 32px rgba(0, 0, 0, 0.4);
    border-color: rgba(128, 255, 0, 0.35);
  }
  50% {
    box-shadow: 0 0 0 8px rgba(128, 255, 0, 0.04),
                0 0 36px rgba(128, 255, 0, 0.22),
                0 8px 32px rgba(0, 0, 0, 0.4);
    border-color: rgba(128, 255, 0, 0.55);
  }
}
.signup-form:focus-within {
  animation: none;
  border-color: var(--slam-lime);
  box-shadow: 0 0 0 5px rgba(128, 255, 0, 0.22),
              0 0 48px rgba(128, 255, 0, 0.32),
              0 8px 32px rgba(0, 0, 0, 0.4);
  transform: translateY(-1px);
}
.signup-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--slam-white);
  font-family: var(--font-sans);
  font-size: 16px;
  padding: 16px 6px;
  min-width: 0;
  text-align: left;
}
.signup-input::placeholder { color: var(--fg-dim); }
.signup-submit {
  font-family: var(--font-sans);
  font-weight: 700;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 15px 24px;
  border-radius: 999px;
  background: var(--slam-red);
  color: var(--slam-white);
  border: none;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: background var(--dur-fast) var(--ease-out),
              transform var(--dur-fast) var(--ease-snap),
              box-shadow var(--dur-base) var(--ease-out);
  white-space: nowrap;
  box-shadow: 0 4px 14px rgba(218, 0, 22, 0.32);
}
.signup-submit:hover {
  background: var(--slam-red-deep);
  box-shadow: 0 6px 20px rgba(218, 0, 22, 0.5);
}
.signup-submit:active { transform: scale(0.96); }
.signup-submit:disabled { opacity: 0.6; cursor: wait; }
.signup-submit svg { transition: transform var(--dur-base) var(--ease-snap); }
.signup-submit:hover svg { transform: translateX(3px); }

.signup-status {
  margin-top: 14px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-muted);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 18px;
}
.signup-status.success { color: var(--slam-lime); }
.signup-status.error { color: var(--slam-red); }
.signup-status svg { width: 14px; height: 14px; }

.signup-footnote {
  margin-top: 14px;
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--fg-dim);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.signup-footnote svg { width: 13px; height: 13px; }

@media (prefers-reduced-motion: reduce) {
  .signup-form, .hero-bg.vignette > svg { animation: none; }
  .welcome-eyebrow, .signup-wrap-center, .hero-desc, .hero-logo { opacity: 1; animation: none; transform: none; }
  .hero-title .word { opacity: 1; transform: none; filter: none; animation: none; }
}

/* ============== WHAT'S HAPPENING (3 col) ============== */
.happening {
  margin: 80px 32px 80px;
  position: relative;
}
.happening-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 28px;
  padding: 0 4px;
}
.happening-title {
  font-family: var(--font-display);
  font-size: clamp(36px, 4.6vw, 68px);
  line-height: 0.95;
  letter-spacing: -0.015em;
  text-transform: uppercase;
  color: var(--slam-white);
  margin: 0;
}
.happening-sub {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--fg-muted);
  margin: 0;
}

.happening-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 20px;
  align-items: stretch;
}

/* ---- Generic card chrome ---- */
.card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  transition: border-color var(--dur-base) var(--ease-out),
              transform var(--dur-base) var(--ease-out);
}
.card:hover { border-color: var(--border-strong); }
.card-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.card-eyebrow {
  font-family: var(--font-display);
  font-size: 22px;
  line-height: 1;
  letter-spacing: -0.01em;
  text-transform: uppercase;
  color: var(--slam-white);
}
.card-meta {
  font-family: var(--font-mono);

  text-transform: uppercase;
  color: var(--fg-dim);
}

/* ---- Calendar ---- */
.cal-dow {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--fg-dim);
  text-align: center;
  padding-bottom: 4px;
}
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.cal-cell {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--fg-muted);
  border-radius: 8px;
  position: relative;
  transition: background var(--dur-fast) var(--ease-out),
              color var(--dur-fast) var(--ease-out);
}
.cal-cell.empty { visibility: hidden; }
.cal-cell.has-event { color: var(--slam-white); font-weight: 700; }
.cal-cell.has-event:hover { background: var(--slam-coal); cursor: pointer; }
.cal-cell.today {
  background: var(--slam-red);
  color: var(--slam-white);
  font-weight: 700;
}
.cal-dot {
  position: absolute;
  bottom: 3px;
  left: 50%;
  transform: translateX(-50%);
  width: 4px;
  height: 4px;
  border-radius: 999px;
  background: var(--slam-lime);
}
.cal-cell.today .cal-dot { background: var(--slam-white); }

.cal-upcoming {
  margin-top: 8px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.cal-upcoming-label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;

}
.cal-event {

  gap: 14px;
  align-items: flex-start;
}
.cal-event-date {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex-shrink: 0;
  width: 42px;
  padding: 6px 0;
  background: var(--slam-coal);
  border-radius: 10px;
}
.cal-event-dow {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--slam-lime);
}
.cal-event-day {
  font-family: var(--font-display);
  font-size: 22px;

}
.cal-event-icon {
  display: flex;
  align-items: center;

}
.cal-event-emoji {
  font-size: 24px;
  line-height: 1;
}
.cal-event-body { flex: 1; min-width: 0; }
.cal-event-tag {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 9px;

}
.tag-practice { background: rgba(128,255,0,0.12); color: var(--slam-lime); }
.tag-game     { background: rgba(218,0,22,0.15); color: var(--slam-red); }

.cal-event-title {

}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}

// ---------------------------------------------------------------------------
// Signup form — POSTs to a Google Apps Script Web App URL.
// Falls back to localStorage when no endpoint is configured.
// ---------------------------------------------------------------------------
function SignupForm({ endpoint, accent }) {
  const [email, setEmail] = useState("");
  const [status, setStatus] = useState({ kind: "idle", msg: "" });

  async function submit(e) {
    e.preventDefault();
    const cleaned = email.trim().toLowerCase();
    if (!cleaned || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(cleaned)) {
      setStatus({ kind: "error", msg: "Drop a real email" });
      return;
    }

    setStatus({ kind: "sending", msg: "Sending…" });

    // Always mirror to localStorage so the data isn't lost if the endpoint is down
    try {
      const key = "slam_signups";
      const prev = JSON.parse(localStorage.getItem(key) || "[]");
      if (!prev.find((r) => r.email === cleaned)) {
        prev.push({ email: cleaned, at: new Date().toISOString() });
        localStorage.setItem(key, JSON.stringify(prev));
      }
    } catch (_) {}

    if (!endpoint) {
      setStatus({
        kind: "success",
        msg: "Saved locally — add endpoint in Tweaks to ship to the sheet.",
      });
      setEmail("");
      return;
    }

    try {
      const fd = new FormData();
      fd.append("email", cleaned);
      fd.append("source", "landing");
      fd.append("ua", navigator.userAgent);
      // Apps Script web apps don't set CORS headers — use no-cors and assume
      // success on resolution. (Errors only fire on network failure.)
      await fetch(endpoint, { method: "POST", body: fd, mode: "no-cors" });
      setStatus({ kind: "success", msg: "You're in. We'll be in touch." });
      setEmail("");
    } catch (err) {
      setStatus({
        kind: "error",
        msg: "Couldn't reach the endpoint — saved locally.",
      });
    }
  }

  return (
    <div className="signup">
      <form className="signup-form" onSubmit={submit}>
        <input
          className="signup-input"
          type="email"
          placeholder="parent@email.com"
          value={email}
          onChange={(e) => setEmail(e.target.value)}
          aria-label="Email address"
          autoComplete="email"
          required
        />
        <button
          className="signup-submit"
          type="submit"
          disabled={status.kind === "sending"}
          style={accent === "lime" ? { background: "var(--slam-lime)", color: "var(--slam-black)" } : null}
        >
          {status.kind === "sending" ? "Sending…" : "Sign me up"}
          <Icon name="arrow-right" size={16} />
        </button>
      </form>

      <div className={`signup-status ${status.kind}`} role="status" aria-live="polite">
        {status.kind === "success" && <><Icon name="check-circle-2" size={14} /> {status.msg}</>}
        {status.kind === "error" && <><Icon name="alert-circle" size={14} /> {status.msg}</>}
        {status.kind === "sending" && <span>{status.msg}</span>}
        {status.kind === "idle" && <span>&nbsp;</span>}
      </div>

      <div className="signup-footnote">
        <Icon name="shield-check" size={13} />
        No spam, ever · Unsubscribe any time
      </div>
    </div>
  );
}

// Pulls all three content arrays from the Apps Script endpoint on mount.
// Returns the fallback arrays until the fetch resolves, so the page is never
// blank. If the fetch fails (CORS, network, sheet empty, etc.), the fallbacks
// remain — no error UI for content, just defaults.
function useContent(endpoint) {
  const [content, setContent] = useState({
    posts: DEFAULT_POSTS,
    events: DEFAULT_EVENTS,
    faq: DEFAULT_FAQ,
    loaded: false,
  });

  useEffect(() => {
    if (!endpoint) return;
    let cancelled = false;
    fetch(`${endpoint}?action=all&t=${Date.now()}`)
      .then((r) => r.json())
      .then((data) => {
        if (cancelled) return;
        setContent((prev) => ({
          posts:  Array.isArray(data.posts)  && data.posts.length  ? data.posts  : prev.posts,
          events: Array.isArray(data.events) && data.events.length ? data.events : prev.events,
          faq:    Array.isArray(data.faq)    && data.faq.length    ? data.faq    : prev.faq,
          loaded: true,
        }));
      })
      .catch(() => {
        // Silent fail — keep fallback content.
        if (!cancelled) setContent((prev) => ({ ...prev, loaded: true }));
      });
    return () => { cancelled = true; };
  }, [endpoint]);

  return content;
}

function Calendar({ events }) {
  // Show the current month, dynamically. Today is highlighted.
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const today = now.getDate();
  const monthLabel = now.toLocaleString("default", { month: "long", year: "numeric" });

  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstDayOfWeek = new Date(year, month, 1).getDay();

  const cells = [];
  for (let i = 0; i < firstDayOfWeek; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  // Which days this month have events?
  const monthPrefix = `${year}-${String(month + 1).padStart(2, "0")}`;
  const eventDays = events
    .filter((e) => String(e.date || "").startsWith(monthPrefix))
    .map((e) => parseInt(String(e.date).slice(8, 10), 10))
    .filter((n) => !isNaN(n));

  // Upcoming = next 3 events from today onwards (then any future ones)
  const todayStr = `${year}-${String(month + 1).padStart(2, "0")}-${String(today).padStart(2, "0")}`;
  const upcoming = events
    .filter((e) => String(e.date || "") >= todayStr)
    .sort((a, b) => String(a.date).localeCompare(String(b.date)))
    .slice(0, 3);

  return (
    <div className="card cal">
      <div className="card-head">
        <span className="card-eyebrow">Calendar</span>
        <span className="card-meta">{monthLabel}</span>
      </div>

      <div className="cal-dow">
        {["S","M","T","W","T","F","S"].map((d, i) => (
          <span key={i}>{d}</span>
        ))}
      </div>
      <div className="cal-grid">
        {cells.map((d, i) => {
          if (d === null) return <span key={i} className="cal-cell empty" />;
          const hasEvent = eventDays.includes(d);
          const isToday = d === today;
          return (
            <span
              key={i}
              className={`cal-cell${isToday ? " today" : ""}${hasEvent ? " has-event" : ""}`}
            >
              {d}
              {hasEvent && <span className="cal-dot" />}
            </span>
          );
        })}
      </div>

      <div className="cal-upcoming">
        <div className="cal-upcoming-label">Up next</div>
        {upcoming.length === 0 ? (
          <div className="cal-empty">No upcoming events. Check back soon.</div>
        ) : upcoming.map((e, i) => {
          const type = String(e.type || "event").toLowerCase();
          const sportIcon = {
            practice: "🏃",
            game:     "🏆",
            event:    "🎉",
            basketball: "🏀",
            soccer:   "⚽",
            baseball: "⚾",
            softball: "🥎",
            football: "🏈",
            volleyball: "🏐",
            tennis:   "🎾",
            swimming: "🏊",
            track:    "🏃",
            camp:     "⛺",
          };
          // Pick icon: check if the event title contains a sport name first,
          // then fall back to the event type.
          const titleLower = String(e.title || "").toLowerCase();
          const icon =
            titleLower.includes("basketball") ? "🏀" :
            titleLower.includes("soccer")     ? "⚽" :
            titleLower.includes("baseball")   ? "⚾" :
            titleLower.includes("softball")   ? "🥎" :
            titleLower.includes("football")   ? "🏈" :
            titleLower.includes("volleyball") ? "🏐" :
            titleLower.includes("tennis")     ? "🎾" :
            titleLower.includes("swim")       ? "🏊" :
            titleLower.includes("track")      ? "🏃" :
            titleLower.includes("camp")       ? "⛺" :
            titleLower.includes("bbq")        ? "🔥" :
            titleLower.includes("championship") ? "🏆" :
            sportIcon[type] || "📅";
          return (
            <div key={i} className="cal-event">
              <div className="cal-event-icon">
                <span className="cal-event-emoji">{icon}</span>
              </div>
              <div className="cal-event-body">
                <div className={`cal-event-tag tag-${type}`}>{type}</div>
                <div className="cal-event-title">{e.title}</div>
                <div className="cal-event-time">{e.time}</div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

                <span>{item.q}</span>
                <span className="qa-icon" aria-hidden="true">
                  {isOpen ? "−" : "+"}
                </span>
              </button>
              <div className="qa-a-wrap" style={{ maxHeight: isOpen ? 400 : 0 }}>
                <p className="qa-a">{item.a}</p>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function WhatsHappening({ endpoint }) {
  const { posts, events, faq } = useContent(endpoint);
  return (
    <section className="happening" data-screen-label="02 Happening">

        <p className="happening-sub">Schedules · Updates · Answers</p>

      <div className="happening-grid">
        <Calendar events={events} />
        <Feed posts={posts} />
        <QA faq={faq} />
      </div>
    </section>
  );
}
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "heroBg": "pattern",
  "signupEndpoint": "https://script.google.com/macros/s/AKfycbxKWDLcTjDwwXb-rNq9LTpqQwmlGgvLHZf9kJKDG7DHqwNp6vjaXD8S4ccG_41CBMfk/exec"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  return (
    <div className="page">
      <Nav />
      <Hero bg={t.heroBg} endpoint={t.signupEndpoint} />
      <WhatsHappening endpoint={t.signupEndpoint} />

      <TweaksPanel title="Tweaks">
        <TweakSection label="Hero background" />
        <TweakRadio
          label="Style"
          value={t.heroBg}
          options={["pattern", "scoreboard", "black", "red", "lime"]}
          onChange={(v) => setTweak("heroBg", v)}
        />

        <TweakSection label="Email backend" />
        <TweakText
          label="Apps Script URL"
          value={t.signupEndpoint}
          placeholder="https://script.google.com/.../exec"
          onChange={(v) => setTweak("signupEndpoint", v)}
        />
        <TweakButton
          label="View local backup"
          onClick={() => {
            const rows = JSON.parse(localStorage.getItem("slam_signups") || "[]");
            if (!rows.length) { alert("No local signups yet."); return; }
            const csv = "email,at\n" + rows.map((r) => `${r.email},${r.at}`).join("\n");
            const blob = new Blob([csv], { type: "text/csv" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = "slam-signups.csv"; a.click();
            URL.revokeObjectURL(url);
          }}
        >
          Download CSV
        </TweakButton>
      </TweaksPanel>
    </div>
  );
}

window.App = App;
